name: CD Pipeline — Deploy

on:
  push:
    branches: [main]

env:
  BACKEND_DIR: ./backend
  FRONTEND_DIR: ./frontend
  REGISTRY: ghcr.io
  BACKEND_IMAGE_BASE: studio-backend
  FRONTEND_IMAGE_BASE: studio-frontend

jobs:
  # ============================================================
  # PREPARATION (Build metadata and lowercase transforms)
  # ============================================================
  prep:
    name: Prepare Environment & Tags
    runs-on: ubuntu-latest
    outputs:
      backend_image: ${{ steps.transform.outputs.backend_image }}
      frontend_image: ${{ steps.transform.outputs.frontend_image }}
      tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Transform Registry Owner to Lowercase
        id: transform
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "backend_image=${{ env.REGISTRY }}/${OWNER_LOWER}/${{ env.BACKEND_IMAGE_BASE }}" >> $GITHUB_OUTPUT
          echo "frontend_image=${{ env.REGISTRY }}/${OWNER_LOWER}/${{ env.FRONTEND_IMAGE_BASE }}" >> $GITHUB_OUTPUT

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.BACKEND_IMAGE_BASE }}
          tags: |
            type=sha,format=short
            type=raw,value=latest

  # ============================================================
  # BUILD & PUSH BACKEND
  # ============================================================
  build-push-backend:
    name: Build & Push Backend Image
    runs-on: ubuntu-latest
    needs: prep
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.prep.outputs.backend_image }}
          tags: |
            type=sha,format=short
            type=raw,value=latest

      - name: Build and push Backend Image
        uses: docker/build-push-action@v7
        with:
          context: ${{ env.BACKEND_DIR }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # BUILD & PUSH FRONTEND
  # ============================================================
  build-push-frontend:
    name: Build & Push Frontend Image
    runs-on: ubuntu-latest
    needs: prep
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.prep.outputs.frontend_image }}
          tags: |
            type=sha,format=short
            type=raw,value=latest

      - name: Build and push Frontend Image
        uses: docker/build-push-action@v7
        with:
          context: ${{ env.FRONTEND_DIR }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # CONFIGURABLE DEPLOYMENT TARGET
  # ============================================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [prep, build-push-backend, build-push-frontend]
    environment: production
    steps:
      - uses: actions/checkout@v4

      # ============ TARGET OPTION 1: VPS via SSH (git pull + Docker Compose build) ============
      # Secrets: VPS_HOST (or SSH_HOST), VPS_USER (or SSH_USER), VPS_SSH_KEY (or SSH_PRIVATE_KEY)
      - name: Deploy to VPS (git pull + Docker Compose)
        if: "${{ (secrets.VPS_HOST != '' || secrets.SSH_HOST != '') && (secrets.VPS_USER != '' || secrets.SSH_USER != '') && (secrets.VPS_SSH_KEY != '' || secrets.SSH_PRIVATE_KEY != '') }}"
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST || secrets.SSH_HOST }}
          username: ${{ secrets.VPS_USER || secrets.SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY || secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            APP_DIR="${{ secrets.VPS_APP_DIR || '/opt/studio' }}"
            cd "$APP_DIR"
            git pull origin main
            docker compose -f docker-compose.prod.yml up -d --build
            docker image prune -f

      # ============ TARGET OPTION 1b: VPS via GHCR (pull pre-built images) ============
      - name: Deploy to VPS (GHCR pull)
        if: "${{ secrets.VPS_GHCR_DEPLOY == 'true' && (secrets.VPS_HOST != '' || secrets.SSH_HOST != '') && (secrets.VPS_USER != '' || secrets.SSH_USER != '') && (secrets.VPS_SSH_KEY != '' || secrets.SSH_PRIVATE_KEY != '') }}"
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST || secrets.SSH_HOST }}
          username: ${{ secrets.VPS_USER || secrets.SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY || secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p /opt/studio
            cd /opt/studio
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull down the latest image tags and recreate containers
            docker compose pull
            docker compose up -d --remove-orphans
            
            # Clean up dangling images to save disk space
            docker system prune -af

      # ============ TARGET OPTION 2: Render Deploy Webhook ============
      # To enable, define secret: RENDER_DEPLOY_HOOK_URL
      - name: Trigger Render Deployment
        if: "${{ secrets.RENDER_DEPLOY_HOOK_URL != '' }}"
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      # ============ TARGET OPTION 3: Railway Deploy Webhook ============
      # To enable, define secret: RAILWAY_DEPLOY_HOOK_URL
      - name: Trigger Railway Deployment
        if: "${{ secrets.RAILWAY_DEPLOY_HOOK_URL != '' }}"
        run: |
          curl -X POST "${{ secrets.RAILWAY_DEPLOY_HOOK_URL }}"

      # ============ TARGET OPTION 4: Coolify Deploy Webhook ============
      # To enable, define secret: COOLIFY_DEPLOY_WEBHOOK
      - name: Trigger Coolify Deployment
        if: "${{ secrets.COOLIFY_DEPLOY_WEBHOOK != '' }}"
        run: |
          curl -X POST "${{ secrets.COOLIFY_DEPLOY_WEBHOOK }}"

      # ============ INFORMATIONAL OUTPUT ============
      - name: Deployment Information Summary
        run: |
          echo "==> Production Deployment Flow Complete"
          echo "Backend Image:  ${{ needs.prep.outputs.backend_image }}:${{ needs.prep.outputs.tag }}"
          echo "Frontend Image: ${{ needs.prep.outputs.frontend_image }}:${{ needs.prep.outputs.tag }}"
          echo ""
          echo "Deployment configurations are active based on the defined Repository Secrets."
