name: CI Pipeline

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

env:
  BACKEND_DIR: ./backend
  FRONTEND_DIR: ./frontend

jobs:
  # ============================================================
  # BACKEND JOBS
  # ============================================================
  backend-lint-format-typecheck:
    name: Backend — Lint, Format & Types
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.BACKEND_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "${{ env.BACKEND_DIR }}/requirements-dev.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run Black Formatter check
        run: black --check .

      - name: Run Ruff Linter
        run: ruff check .

      - name: Run MyPy Typechecker
        run: mypy . --ignore-missing-imports

  backend-test-migration:
    name: Backend — Migrations & Tests
    runs-on: ubuntu-latest
    needs: backend-lint-format-typecheck
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: studio_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: ${{ env.BACKEND_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "${{ env.BACKEND_DIR }}/requirements-dev.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Validate Alembic Migrations (Upgrade head)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/studio_test
        run: alembic upgrade head

      - name: Run Pytest (with coverage reporting)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/studio_test
        run: pytest -v --cov=. --cov-report=xml

  backend-docker-build:
    name: Backend — Docker Build & Vulnerability Scan
    runs-on: ubuntu-latest
    needs: backend-test-migration
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.BACKEND_DIR }}
          push: false
          load: true
          tags: studio-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Backend Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'studio-backend:ci'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

  # ============================================================
  # FRONTEND JOBS
  # ============================================================
  frontend-lint:
    name: Frontend — Lint & Format check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.FRONTEND_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: "${{ env.FRONTEND_DIR }}/package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier check
        run: npm run format

  frontend-build:
    name: Frontend — React compilation
    runs-on: ubuntu-latest
    needs: frontend-lint
    defaults:
      run:
        working-directory: ${{ env.FRONTEND_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: "${{ env.FRONTEND_DIR }}/package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Build React application
        run: npm run build

  frontend-docker-build:
    name: Frontend — Docker Build & Vulnerability Scan
    runs-on: ubuntu-latest
    needs: frontend-build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.FRONTEND_DIR }}
          push: false
          load: true
          tags: studio-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Frontend Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'studio-frontend:ci'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
