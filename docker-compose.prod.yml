# Production stack for Oracle Cloud (backend + database only).
# Frontend is hosted separately on Vercel.
#
# Usage on the VM:
#   cp .env.production.example .env
#   docker compose -f docker-compose.prod.yml up -d --build

services:
  postgres:
    image: postgres:16-alpine
    container_name: studio-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-studio}
    volumes:
      - studio-postgres-data:/var/lib/postgresql/data
    networks:
      - studio-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-studio}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: studio-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - STUDIO_ADMIN_USER=${STUDIO_ADMIN_USER:-admin}
      - STUDIO_SECRET_KEY=${STUDIO_SECRET_KEY:-${SECRET_KEY}}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=${LOG_FORMAT:-json}
    volumes:
      - studio-uploads:/app/uploads
      - studio-logs:/app/logs
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    networks:
      - studio-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/services')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  studio-net:
    driver: bridge

volumes:
  studio-postgres-data:
    driver: local
  studio-uploads:
    driver: local
  studio-logs:
    driver: local
