# Host Nginx config for api.yourdomain.com
# Install: sudo cp deploy/nginx-api.conf /etc/nginx/sites-available/studio-api
#          sudo ln -s /etc/nginx/sites-available/studio-api /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
#
# Replace api.elwarsha.tn with your API subdomain before enabling.

server {
    listen 80;
    server_name api.elwarsha.tn;

    client_max_body_size 25M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
